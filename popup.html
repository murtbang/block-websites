<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>Block Websites</title>
</head>
<body>
  <header>
    <div class="brand">
      <img src="icons/icon.svg" alt="" width="22" height="22">
      <h1>Block Websites</h1>
    </div>
    <label class="switch" title="Turn blocking on or off">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </header>

  <div id="permBanner" class="banner hidden">
    <p>Blocking needs permission to redirect sites. Grant it once to start blocking.</p>
    <button id="grantBtn">Enable blocking</button>
  </div>

  <div class="add-row">
    <input type="text" id="siteInput" placeholder="e.g. facebook.com" autocomplete="off" spellcheck="false">
    <button id="addBtn" title="Add to blocklist">Add</button>
  </div>
  <button id="blockCurrentBtn" class="secondary">Block current site</button>

  <ul id="list" class="list"></ul>
  <p id="empty" class="empty hidden">No sites blocked yet. Add one above.</p>

  <footer id="status"></footer>

  <script src="popup.js"></script>
</body>
</html>
